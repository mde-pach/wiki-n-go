name: CI

# Clean-clone verification: a fresh checkout must install, lint, test, and build
# for both the app and the Worker. Catches dependency drift (e.g. a package
# declared but not installed) and any broken test/build before merge.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install app deps
        run: bun install --frozen-lockfile

      - name: Lint + format check
        run: bun run lint

      - name: App tests
        run: bun run test

      - name: App build
        run: bun run build

      - name: Install worker deps
        run: bun install --frozen-lockfile
        working-directory: worker

      - name: Worker verify (typecheck + tests)
        run: bun run verify
        working-directory: worker
