name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "content/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        env:
          # Repo identity + URLs derived from context, so a fork needs no config
          # edits. WORKER_URL is a repo variable (set once, or auto-set by the
          # worker deploy); the rest are optional and gate their features.
          # config.ts / astro.config.mjs fall back to this repo's values when
          # any of these are unset.
          SITE_URL: https://${{ github.repository_owner }}.github.io
          BASE_PATH: /${{ github.event.repository.name }}
          PUBLIC_REPO_OWNER: ${{ github.repository_owner }}
          PUBLIC_REPO_NAME: ${{ github.event.repository.name }}
          PUBLIC_WORKER_URL: ${{ vars.WORKER_URL }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          PUBLIC_OAUTH_ENABLED: ${{ vars.OAUTH_ENABLED }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
