name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "content/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    # The flagship serves from Cloudflare Pages: set the CF_PAGES_PROJECT repo var
    # plus the CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets. Forks leave
    # it unset and deploy via deploy-pages.yml (GitHub Pages) instead.
    if: ${{ vars.CF_PAGES_PROJECT != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build Astro site
        run: bun run build
        env:
          # Server-render the content route on demand so the first paint is the
          # latest content (no build-time stale-then-fresh flash). Other routes
          # stay prerendered; see astro.config.mjs.
          EDGE_SSR: cloudflare
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
          BASE_PATH: ${{ vars.BASE_PATH || format('/{0}', github.event.repository.name) }}
          PUBLIC_REPO_OWNER: ${{ github.repository_owner }}
          PUBLIC_REPO_NAME: ${{ github.event.repository.name }}
          PUBLIC_WORKER_URL: ${{ vars.WORKER_URL }}
          PUBLIC_POW_BITS: ${{ vars.POW_BITS }}
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main
