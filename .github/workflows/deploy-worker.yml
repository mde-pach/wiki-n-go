name: Deploy Worker

# Deploys the Cloudflare Worker whenever its code changes on main. The Worker's
# runtime secrets (GITHUB_TOKEN, HASH_SECRET, TURNSTILE_SECRET) persist across
# deploys and are managed out-of-band via worker/deploy.sh, so CI only needs the
# Cloudflare credentials.
on:
  push:
    branches: [main]
    paths: ["worker/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
