name: Deploy Worker

# Deploys the Cloudflare Worker and provisions its runtime secrets — GitHub is
# the only control plane (no local deploy script). HASH_SECRET and SESSION_SECRET
# are generated once and never rotated; the rest come from repo secrets and are
# only applied when set, so missing-but-optional features simply stay off and an
# already-provisioned secret is never clobbered.
#
# Write credential: set repo variable GH_APP_ID + secret GH_APP_PRIVATE_KEY (the
# /setup wizard hands you both), and/or the legacy WORKER_GITHUB_TOKEN PAT. Forks
# that prefer the Deploy-to-Cloudflare button can skip this workflow entirely.
on:
  push:
    branches: [main]
    paths: ["worker/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Deploy
        id: deploy
        env:
          # Non-secret ids injected as plain vars so a fork sets them as repo
          # variables, never edits a file. Empty = omit.
          OAUTH_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
          GITHUB_APP_ID: ${{ vars.GH_APP_ID }}
        run: |
          args=""
          [ -n "${OAUTH_CLIENT_ID:-}" ] && args="$args --var OAUTH_CLIENT_ID:$OAUTH_CLIENT_ID"
          [ -n "${GITHUB_APP_ID:-}" ] && args="$args --var GITHUB_APP_ID:$GITHUB_APP_ID"
          out=$(bunx wrangler deploy $args 2>&1)
          echo "$out"
          url=$(printf '%s\n' "$out" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Provision secrets
        env:
          WORKER_GITHUB_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
        run: |
          existing=$(bunx wrangler secret list 2>/dev/null || echo '[]')
          has() { printf '%s' "$existing" | grep -q "\"name\": *\"$1\""; }
          # Generate-if-absent, never rotate (rotating HASH_SECRET breaks every
          # anon identity + trust history).
          gen() {
            has "$1" && { echo "$1: present"; return; }
            openssl rand -base64 48 | tr -d '\n' | bunx wrangler secret put "$1"
          }
          # Apply only when a value is provided, so empties never wipe a secret.
          put() {
            [ -n "$2" ] || { echo "$1: skipped (no value)"; return; }
            printf '%s' "$2" | bunx wrangler secret put "$1"
          }
          gen HASH_SECRET
          gen SESSION_SECRET
          # Write credential: the App private key (preferred) and/or a bot PAT.
          # The Worker prefers the App when GH_APP_ID + key are set (githubApp.ts).
          put GITHUB_APP_PRIVATE_KEY "$GH_APP_PRIVATE_KEY"
          put GITHUB_TOKEN "$WORKER_GITHUB_TOKEN"
          put TURNSTILE_SECRET "$TURNSTILE_SECRET"
          put OAUTH_CLIENT_SECRET "$OAUTH_CLIENT_SECRET"

      - name: Record Worker URL
        if: steps.deploy.outputs.url != ''
        continue-on-error: true # needs WORKER_GITHUB_TOKEN with Variables:write; harmless if not granted
        env:
          GH_TOKEN: ${{ secrets.WORKER_GITHUB_TOKEN }}
        run: gh variable set WORKER_URL --body "${{ steps.deploy.outputs.url }}" --repo "$GITHUB_REPOSITORY"
