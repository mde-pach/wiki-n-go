name = "wiki-n-go"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Secrets (set with `wrangler secret put`): GITHUB_TOKEN, HASH_SECRET
[vars]
REPO_OWNER = "mde-pach"
REPO_NAME = "wiki-n-go"
BRANCH = "main"
CONTENT_DIR = "content"
HOME_SLUG = "index"
ALLOWED_ORIGIN = "https://mde-pach.github.io,http://localhost:4321"
REPO_ID = "R_kgDOSxZFTg"
DISCUSSION_CATEGORY_ID = "DIC_kwDOSxZFTs4C-huV"
# Autonomous editing. DEFAULT_EDIT_TIER = "maintainer" keeps the reviewed-PR
# model for any page without a `protection:` frontmatter field (set "open" to
# flip the default to immediate-publish). Trust thresholds match Wikipedia's.
DEFAULT_EDIT_TIER = "maintainer"
AUTOCONFIRM_EDITS = "10"
AUTOCONFIRM_DAYS = "4"
EXTENDED_EDITS = "500"
EXTENDED_DAYS = "30"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "ba108356468b483286ff7fecf452cbf5"
