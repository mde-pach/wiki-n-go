name = "wiki-n-go"
main = "src/index.ts"
compatibility_date = "2026-06-01"

# Write credential (one of):
#   • GitHub App (recommended, fork-and-go): GITHUB_APP_ID + GITHUB_APP_PRIVATE_KEY
#     — short-lived, repo-scoped installation tokens; nothing to rotate. The
#     /setup wizard creates the app and hands you both values.
#   • Bot PAT (legacy): GITHUB_TOKEN — a long-lived contents+PRs write token.
# Always required: HASH_SECRET (the /setup wizard generates one). Optional GitHub
# sign-in adds OAUTH_CLIENT_SECRET + SESSION_SECRET. Set secrets with
# `wrangler secret put`, or in the Deploy-to-Cloudflare dashboard.
[vars]
REPO_OWNER = "mde-pach"
REPO_NAME = "wiki-n-go"
BRANCH = "main"
CONTENT_DIR = "content"
HOME_SLUG = "index"
ALLOWED_ORIGIN = "https://mde-pach.github.io,http://localhost:4321"
# Talk topics post to this Discussions category; its node id (and the repo id)
# are derived at runtime, so a fork only names the category here.
DISCUSSION_CATEGORY = "General"
# Shared hosted instance (the giscus model): one operator-run Worker serving any
# repo that installs the App. Off by default (single-tenant: always the repo
# above). Set MULTI_TENANT = "1" to derive the target repo from each request
# (the site sends an `X-Wiki-Repo: owner/name` header), validate it against the
# App's installs, and namespace KV per repo so tenants stay isolated. Requires
# the GitHub App credential (the per-repo install token is what makes it work).
# MULTI_TENANT = "1"
# Optional GitHub sign-in is configured entirely via repo secrets/variables, no
# edits here: OAUTH_CLIENT_ID is a repo variable injected at deploy (`--var`),
# OAUTH_CLIENT_SECRET a repo secret, SESSION_SECRET auto-generated. See README.
# Autonomous editing. DEFAULT_EDIT_TIER = "maintainer" keeps the reviewed-PR
# model for any page without a `protection:` frontmatter field (set "open" to
# flip the default to immediate-publish). Trust thresholds match Wikipedia's.
DEFAULT_EDIT_TIER = "maintainer"
AUTOCONFIRM_EDITS = "10"
AUTOCONFIRM_DAYS = "4"
EXTENDED_EDITS = "500"
EXTENDED_DAYS = "30"
# Automoderator (ClueBot analog): right after an edit auto-merges, auto-revert it
# when its revert-risk score is at/above AUTOMOD_REVERT_SCORE and the author is
# below AUTOMOD_EXEMPT_TIER. OFF unless AUTOMOD_REVERT_SCORE is set (an unreviewed
# auto-revert is a strong action, so opt-in). Set it well above the human-surfacing
# line (50) — ~80 keeps the bot high-precision. AUTOMOD_REVERT_CAP bounds reverts
# to one page per 24h so the bot can't edit-war. Reverts land as normal reversible
# commits, recorded in audit-log.jsonl + the /admin Automoderator view.
# AUTOMOD_REVERT_SCORE = "80"
AUTOMOD_EXEMPT_TIER = "auto"
AUTOMOD_REVERT_CAP = "3"

# No id → Wrangler auto-provisions a namespace on first deploy (and the
# Deploy-to-Cloudflare button creates one per install). KV here is cache-only
# (rate-limit windows, trust/index caches — all rebuildable; bans/trust derive
# from git), so a fresh namespace loses nothing durable. This keeps the config
# fork-portable: a hardcoded id belongs to one account and can't be shared.
[[kv_namespaces]]
binding = "RATE_LIMIT"
