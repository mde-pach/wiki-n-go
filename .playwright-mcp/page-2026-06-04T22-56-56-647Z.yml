            - paragraph [ref=e258]:
              - text: "Le titre même de cette page n'est pas prouvé. Juste une simple note en bas de page. Le terme premier est: Espresso. Le mot \"Expresso\" est une déformation francophone orale de ce terme, aucune source n'arrive à faire entrer ce terme en force, alors que le mot \"espresso\" est utilisé partout dans le monde. Merci de prouver l'utilisation de ce terme avant d'induire tout le reste du monde en erreur. Merci à qui de droit de déplacer cette page sous son véritable nom: \"Espresso\". Et rien n'empêche de faire un encart sur la façon typique française de le nommer \"expresso\"."
