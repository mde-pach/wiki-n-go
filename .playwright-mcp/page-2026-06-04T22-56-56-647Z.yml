            - paragraph [ref=e210]: J'ai révoqué la modification de la pression d'extraction (a été modifié à 19 bars) aux 9 bars utilisés par l'ensemble des machines professionnelles (entre 8 et 9 bars en fait). Le fait est que la course aux bars fait rage chez les fabricants grand publics, cette course ridicule ne doit pas gagner cet espace de référence
