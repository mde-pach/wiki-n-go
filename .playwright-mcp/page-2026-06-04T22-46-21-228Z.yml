              - text: and his 1884 patent
          - paragraph [ref=e312]:
            - text: Coffee arrived in Italy in the 16th century, and the first recorded coffee houses followed a century later. By the mid-19th century, coffee was drunk throughout Italy, as
            - link "drip coffee" [ref=e313] [cursor=pointer]:
              - /url: /wiki/Drip_coffee
            - text: in homes and as infused coffee in cafés. The drink's popularity expanded following the 1890s as economic depression ended, and businesses responded by working to make their brewing processes more efficient. This coincided with broader efforts by manufacturers across Europe that had been underway since the mid-19th century. These manufacturers were motivated to reduce wait times for café patrons, and wanted to produce machines that could brew coffee in large batches to be portioned later.
            - superscript [ref=e314]:
              - link "[20]" [ref=e315] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010161–163-21"
            - superscript [ref=e316]:
              - link "[21]" [ref=e317] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
          - paragraph [ref=e318]:
            - text: One of these machines was created by
            - link "Angelo Moriondo" [ref=e319] [cursor=pointer]:
              - /url: /wiki/Angelo_Moriondo
            - text: ", an inventor from"
            - link "Turin" [ref=e320] [cursor=pointer]:
              - /url: /wiki/Turin
            - text: . In 1884, Moriondo patented a coffee machine that used steam to propel water through coffee grounds, which was "almost certainly the first Italian bar machine that controlled the supply of steam and water separately through the coffee". According to Bersten, this made Moriondo "certainly one of the earliest discoverers of the expresso machine, if not the earliest".
            - superscript [ref=e321]:
              - link "[22]" [ref=e322] [cursor=pointer]:
                - /url: "#cite_note-23"
            - superscript [ref=e323]:
              - link "[23]" [ref=e324] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBersten1993105-24"
            - text: Unlike the modern espresso machine, it brewed in bulk, rather than in individual servings.
            - superscript [ref=e325]:
              - link "[20]" [ref=e326] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010161–163-21"
          - generic [ref=e327]:
            - heading "Bezzera's invention" [level=3] [ref=e328]: Bezzera's invention
            - generic [ref=e329]:
              - text: "["
              - link "edit" [ref=e330] [cursor=pointer]:
                - /url: /w/index.php?title=Espresso&action=edit&section=4
              - text: "]"
          - figure "Luigi Bezzera at the 1906 World Fair Expo in Milan" [ref=e331]:
            - link [ref=e332] [cursor=pointer]:
              - /url: /wiki/File:Bezzera_%26_caff%C3%A8_espresso.jpg
              - img [ref=e333]
            - generic [ref=e334]:
              - link "Luigi Bezzera" [ref=e335] [cursor=pointer]:
                - /url: /wiki/Luigi_Bezzera
              - text: at the 1906 World Fair Expo in Milan
          - paragraph [ref=e336]:
            - text: A machine that could brew individual servings came in the new century. In 1901, the inventor
            - link "Luigi Bezzera" [ref=e337] [cursor=pointer]:
              - /url: /wiki/Luigi_Bezzera
            - text: of Milan filed a patent for his coffee maker. This machine contained a boiler, which when heated generated steam that would direct water through one of several heads, cooled on its path to a temperature considered more suitable for brewing. To the heads, a
            - link "portafilter" [ref=e338] [cursor=pointer]:
              - /url: /wiki/Portafilter
            - text: containing compressed coffee could be attached, producing coffee in individual portions, that is, 'expressly' for the customer.
            - superscript [ref=e339]:
              - link "[24]" [ref=e340] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010163–164-25"
            - superscript [ref=e341]:
              - link "[21]" [ref=e342] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
          - paragraph [ref=e343]:
            - text: In 1903, another Milanese man,
            - link "Desiderio Pavoni" [ref=e344] [cursor=pointer]:
              - /url: /wiki/Desiderio_Pavoni
            - text: ", purchased Bezzera's patents. He modified the design by adding a mechanism to release pressure and in 1905 began to sell machines. These are generally held to be the first commercial espresso machines. Although early espresso machines could produce coffee at a rate of 1,000 an hour, the steam and high temperatures gave the drinks a black appearance and a burnt, bitter taste. The pressure they generated was around 1.5"
            - link "bars" [ref=e345] [cursor=pointer]:
              - /url: /wiki/Bar_(unit)
            - text: (150
            - link "kPa" [ref=e346] [cursor=pointer]:
              - /url: /wiki/Pascal_(unit)
            - text: ), too little to produce a drink that would be considered espresso today, and they lacked the foam "crema". Espressi were longer and took more time to pull—almost a minute, around twice that of the modern espresso.
            - superscript [ref=e347]:
              - link "[21]" [ref=e348] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
            - superscript [ref=e349]:
              - link "[25]" [ref=e350] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010164–165-26"
          - generic [ref=e352]:
            - generic [ref=e354]: Early espresso machines
            - generic [ref=e355]:
              - generic [ref=e356]:
                - link [ref=e359] [cursor=pointer]:
                  - /url: /wiki/File:Mumac_-_manometro.jpg
                  - img [ref=e360]
                - generic [ref=e361]:
                  - text: Early 20th-century design. The pressure gauge goes to 3
                  - link "bars" [ref=e362] [cursor=pointer]:
                    - /url: /wiki/Bar_(unit)
                  - text: .
              - generic [ref=e363]:
                - link [ref=e366] [cursor=pointer]:
                  - /url: /wiki/File:Macchina_Gaggia.jpg
                  - img [ref=e367]
                - generic [ref=e368]:
                  - text: Gaggia Internazionale, c. 1950, serving a bar in
                  - link "Eritrea" [ref=e369] [cursor=pointer]:
                    - /url: /wiki/Eritrea
                  - text: ", 2008"
          - paragraph [ref=e370]:
            - text: In 1906, Bezzera and Pavoni attended the World Fair Expo in Milan, selling their respective machines. During the following decade, the market for espresso was limited to Milan.
            - superscript [ref=e371]:
              - link "[21]" [ref=e372] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
            - text: This gradually expanded, helped by the popularity of American-style bars which permitted coffee served standing rather than sitting, and by World War I, when young Italian men who were given coffee as rations took up a daily habit. Still, for the first thirty years, few establishments could afford the expensive machines, and Pavoni and two other manufacturers—
            - link "Victoria Arduino" [ref=e373] [cursor=pointer]:
              - /url: /w/index.php?title=Victoria_Arduino&action=edit&redlink=1
            - generic [ref=e374]:
              - text: "["
              - link "fr" [ref=e375] [cursor=pointer]:
                - /url: https://fr.wikipedia.org/wiki/Victoria_Arduino
              - text: "]"
            - text: in Turin and San Marco in Udine—produced most machines for the small Italian market, relying on exports across Europe to remain profitable.
            - superscript [ref=e376]:
              - link "[26]" [ref=e377] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010162,_164-27"
          - paragraph [ref=e378]:
            - text: The machine continued to develop over its first decades. Design shifted from one of austerity to opulence. With their
            - link "Art Deco" [ref=e379] [cursor=pointer]:
              - /url: /wiki/Art_Deco
            - text: "appearance, by the 1920s espresso machines were held out popularly in Italy to represent domestic modernity, a trend driven in part by the marketing efforts of Pier Teresio Arduino of Victoria Arduino. Machines also developed in other respects: they shrank, and their energy source moved from gas to electricity."
            - superscript [ref=e380]:
              - link "[11]" [ref=e381] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010164-11"
            - superscript [ref=e382]:
              - link "[21]" [ref=e383] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
            - text: The uptake of coffee continued, peaking in 1929, and in the 1930s a culture of drinking espresso outside the home surpassed the earlier habit of drinking a basic coffee at home. After its peak, coffee consumption declined as
            - link "fascists" [ref=e384] [cursor=pointer]:
              - /url: /wiki/Italian_fascism
            - text: banned luxury items, and the
            - link "Great Depression" [ref=e385] [cursor=pointer]:
              - /url: /wiki/Great_Depression
            - text: impacted consumption. This culminated in 1941, when Italy lost
            - link "its African territories" [ref=e386] [cursor=pointer]:
              - /url: /wiki/Italian_East_Africa
            - text: and all imports of coffee were halted.
            - superscript [ref=e387]:
              - link "[27]" [ref=e388] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010165–167-28"
          - generic [ref=e389]:
            - heading "Achieving higher pressures" [level=3] [ref=e390]
            - generic [ref=e391]:
              - text: "["
              - link "edit" [ref=e392] [cursor=pointer]:
                - /url: /w/index.php?title=Espresso&action=edit&section=5
              - text: "]"
          - figure "A layer of crema forms on top" [ref=e393]:
            - link [ref=e394] [cursor=pointer]:
              - /url: /wiki/File:A_good_cappuccino_starts_with_a_perfect_espresso!!_(4441914182).jpg
              - img [ref=e395]
            - generic [ref=e396]: A layer of crema forms on top
          - paragraph [ref=e397]:
            - text: For decades, manufacturers endeavored to produce a machine that could use higher pressures without the resulting coffee tasting burned. Arduino tried, unsuccessfully, to incorporate air pumps and screw pistons.
            - superscript [ref=e398]:
              - link "[21]" [ref=e399] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
            - text: In 1935 in
            - link "Trieste" [ref=e400] [cursor=pointer]:
              - /url: /wiki/Trieste
            - text: ", Italy,"
            - link "Francesco Illy" [ref=e401] [cursor=pointer]:
              - /url: /wiki/Francesco_Illy
            - text: registered a patent for the Illetta, a machine that used compressed air rather than steam. Three years later in Milan,
            - link "Achille Gaggia" [ref=e402] [cursor=pointer]:
              - /url: /wiki/Gaggia
            - text: registered a patent to do the same, employing a hand-pulled, rotating piston.
            - superscript [ref=e403]:
              - link "[28]" [ref=e404] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010167-29"
          - paragraph [ref=e405]:
            - text: In 1947, Gaggia further developed the piston mechanism. The new machines contained much smaller boilers, which generated steam to push water into a receptacle. These were a standardized size, producing a coffee of a standardized size. In the receptacle, a lever-operated piston containing gears and a spring further pressurized the water up to 12 atmospheres. This water was shot through a coffee puck, producing a foam ("crema") out of
            - link "essential oils" [ref=e406] [cursor=pointer]:
              - /url: /wiki/Essential_oil
            - text: and
            - link "colloids" [ref=e407] [cursor=pointer]:
              - /url: /wiki/Colloid
            - text: . Gaggia began selling these the following year, using advertising to emphasize the lack of steam and the presence of crema. For the latter, the drink was marketed under the name
            - generic "Italian-language text" [ref=e408]: crema caffè
            - text: . These are typically seen as the first modern espresso machines.
            - superscript [ref=e409]:
              - link "[29]" [ref=e410] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010168-30"
            - superscript [ref=e411]:
              - link "[21]" [ref=e412] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
          - paragraph [ref=e413]:
            - text: Over the next decade, workshops in Milan continued to innovate new designs. One of these came from the
            - link "Cimbali" [ref=e414] [cursor=pointer]:
              - /url: /w/index.php?title=La_Cimbali&action=edit&redlink=1
            - generic [ref=e415]:
              - text: "["
              - link "it" [ref=e416] [cursor=pointer]:
                - /url: https://it.wikipedia.org/wiki/Gruppo_Cimbali
              - text: "]"
            - text: company, which replaced springs with hydraulics. Like Gaggia, they attempted to market the coffee under a new name—this time,
            - generic "Italian-language text" [ref=e417]: cimbalino
            - text: . The major development came in 1961 by
            - link "Ernesto Valente" [ref=e418] [cursor=pointer]:
              - /url: /wiki/Carlo_Ernesto_Valente
            - text: with the invention of the
            - link "Faema E61" [ref=e419] [cursor=pointer]:
              - /url: /wiki/E-61
            - text: ". Valente had been the original manufacturer of Gaggia's 1948 machine, but their business agreement ended after disagreement over what market should be targeted: Gaggia saw espresso machines as a niche, expensive product for establishments that could afford them, while Valente saw an opportunity for a broad market with cheap machines."
            - superscript [ref=e420]:
              - link "[29]" [ref=e421] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010168-30"
            - superscript [ref=e422]:
              - link "[21]" [ref=e423] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
          - paragraph [ref=e424]:
            - text: In the Faema E61, operation was mechanized, using an on-off switch to control an electric pump that pressurized water to 9
            - link "bars" [ref=e425] [cursor=pointer]:
              - /url: /wiki/Bar_(unit)
            - text: (900
            - link "kPa" [ref=e426] [cursor=pointer]:
              - /url: /wiki/Pascal_(unit)
            - text: ). Water was drawn directly from the plumbing, pressurized, and sent through a copper pipe inside a boiler. As it traveled, the water was maintained at a temperature considered by the manufacturers to be ideal for brewing.
            - superscript [ref=e427]:
              - link "[21]" [ref=e428] [cursor=pointer]:
                - /url: "#cite_note-Stamp-22"
            - superscript [ref=e429]:
              - link "[30]" [ref=e430] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010168–170-31"
            - text: The new machine was cheap, with a "pop" design, and it came as much of Italy gained electricity for the first time. For the
            - link "barista" [ref=e431] [cursor=pointer]:
              - /url: /wiki/Barista
            - text: ", there was no longer a need to pause between espressos as the boiler came back to temperature, and the horizontal boiler permitted eye-level conversation with customers."
            - superscript [ref=e432]:
              - link "[30]" [ref=e433] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2010168–170-31"
          - paragraph [ref=e434]:
            - text: Italians also spread
            - link "espresso culture" [ref=e435] [cursor=pointer]:
              - /url: /wiki/Coffee_culture
            - text: into their
            - link "East African" [ref=e436] [cursor=pointer]:
              - /url: /wiki/East_Africa
            - text: colonies,
            - link "Italian Somalia" [ref=e437] [cursor=pointer]:
              - /url: /wiki/Italian_Somalia
            - text: and
            - link "Italian Eritrea" [ref=e438] [cursor=pointer]:
              - /url: /wiki/Italian_Eritrea
            - text: .
            - superscript [ref=e439]:
              - link "[31]" [ref=e440] [cursor=pointer]:
                - /url: "#cite_note-32"
