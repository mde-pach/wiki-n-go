          - figure "A double ristretto, the first half of the espresso in the bottom glass, the other half in the top glass." [ref=e650]:
            - link [ref=e651] [cursor=pointer]:
              - /url: /wiki/File:Doppio_ristretto_Chiang_Mai.jpg
