          - paragraph [ref=e655]:
            - text: The main variables in an espresso are the "size" and "length".
            - superscript [ref=e656]:
              - link "[50]" [ref=e657] [cursor=pointer]:
                - /url: "#cite_note-hbbr-51"
            - superscript [ref=e658]:
              - link "[51]" [ref=e659] [cursor=pointer]:
                - /url: "#cite_note-gimmie-52"
            - text: This terminology is standardized, but the precise sizes and proportions vary substantially.
          - paragraph [ref=e660]:
            - text: Cafés may have a standardized espresso (size and length), such as "triple
            - link "ristretto" [ref=e661] [cursor=pointer]:
              - /url: /wiki/Ristretto
            - text: "\","
            - superscript [ref=e662]:
              - link "[51]" [ref=e663] [cursor=pointer]:
                - /url: "#cite_note-gimmie-52"
            - text: only varying the amount of espresso in espresso-based drinks such as caffè latte, but not changing the
            - link "extraction" [ref=e664] [cursor=pointer]:
              - /url: /wiki/Espresso_extraction
            - text: .
          - paragraph [ref=e665]:
            - text: The size can be a single, double or triple, using a proportional amount of ground coffee, roughly 7, 14, and 21 grams; correspondingly sized filter baskets are used. The Italian
            - link "multiplier" [ref=e666] [cursor=pointer]:
              - /url: /wiki/Multiplier_(linguistics)
            - text: term doppio is often used for a double, with solo and triplo being more rarely used for singles and triples. The single espresso is the traditional size, being the maximum that could easily be pulled on a lever machine. Single baskets are sharply tapered or stepped down in diameter to provide comparable depth to the double baskets and, therefore, comparable resistance to water pressure. Most double baskets are gently tapered (the "Faema model"), while others, such as the La Marzocco, have straight sides.
          - figure "Extracting a doppio" [ref=e667]:
            - link [ref=e668] [cursor=pointer]:
              - /url: /wiki/File:Doppio.jpg
              - img [ref=e669]
            - generic [ref=e670]:
              - text: Extracting a
              - link "doppio" [ref=e671] [cursor=pointer]:
                - /url: /wiki/Doppio
          - paragraph [ref=e672]: Triple baskets are normally straight-sided. Portafilters will often come with two spouts, usually closely spaced, and a double-size basket. Each spout can optionally dispense into a separate cup, yielding two solo-size (but doppio-brewed) espresso, or into a single cup (hence the close spacing). True solo espresso are rare, with a single espresso in a café generally being half of a doppio espresso. In espresso-based drinks in America, particularly larger milk-based drinks, a drink with three or four espressi will be called "triple" or "quad", respectively.
          - paragraph [ref=e673]:
            - text: "The length of the espresso can be ristretto (or stretto) (reduced), normale or standard (normal) or lungo (long):"
            - superscript [ref=e674]:
              - link "[52]" [ref=e675] [cursor=pointer]:
                - /url: "#cite_note-53"
            - text: these may correspond to a smaller or larger drink with the same amount of ground coffee and same level of extraction or to different length of extraction. Proportions vary, and the volume (and low density) of crema makes volume-based comparisons difficult (precise measurement uses the mass of the drink). Typically, ristretto is half the volume of normale, and lungo is double to triple the normale volume. For a double espresso (14 grams of dry coffee), a normale uses about 60 ml of water. A double ristretto, a common form associated with espresso, uses half the amount of water, about 30 ml. Ristretto, normale, and lungo may not simply be the same espresso stopped at different times (which could result in an under- or over-extracted espresso), but have the grind adjusted (finer for ristretto, coarser for lungo) to achieve the target volume.
            - superscript [ref=e676]:
              - link "[41]" [ref=e677] [cursor=pointer]:
                - /url: "#cite_note-The_World_Atlas_Of_Coffee-42"
            - superscript [ref=e678]: ": 103"
            - text: A significantly longer espresso is the
            - link "caffè crema" [ref=e680] [cursor=pointer]:
              - /url: /wiki/Caff%C3%A8_crema
            - text: ", which is longer than a lungo, ranging in size from 120–240 ml (4.2–8.4 imp fl oz; 4.1–8.1 US fl oz), and brewed in the same way, with a coarser grind. Passing too much water through the ground coffee can add other, potentially unpleasant flavors to the espresso."
            - superscript [ref=e681]:
              - link "[41]" [ref=e682] [cursor=pointer]:
                - /url: "#cite_note-The_World_Atlas_Of_Coffee-42"
            - superscript [ref=e683]: ": 99"
