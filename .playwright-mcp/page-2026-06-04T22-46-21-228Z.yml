              - link "edit" [ref=e295] [cursor=pointer]:
                - /url: /w/index.php?title=Espresso&action=edit&section=3
              - text: "]"
          - generic [ref=e297]:
            - generic [ref=e298]:
              - link [ref=e302] [cursor=pointer]:
                - /url: /wiki/File:Angelo-moriondo-portrait-espresso-machine-inventor.jpg
                - img [ref=e303]
              - link [ref=e307] [cursor=pointer]:
                - /url: /wiki/File:Espresso-machine-first-patent-angelo-moriondo.jpg
                - img [ref=e308]
