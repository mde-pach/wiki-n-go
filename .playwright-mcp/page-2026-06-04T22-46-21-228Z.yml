          - note [ref=e168]:
            - text: For other uses, see
            - link "Espresso (disambiguation)" [ref=e169] [cursor=pointer]:
              - /url: /wiki/Espresso_(disambiguation)
            - text: .
          - figure "A cup of espresso served in Ventimiglia, Italy" [ref=e170]:
            - link [ref=e171] [cursor=pointer]:
              - /url: /wiki/File:Tazzina_di_caff%C3%A8_a_Ventimiglia.jpg
              - img [ref=e172]
            - generic [ref=e173]:
              - text: A cup of espresso served in
              - link "Ventimiglia" [ref=e174] [cursor=pointer]:
                - /url: /wiki/Ventimiglia
              - text: ", Italy"
          - figure "An espresso being pulled from an E61-style espresso machine with a bottomless (naked) portafilter, 2014" [ref=e175]:
            - generic [ref=e178]:
              - text: An espresso being pulled from an
              - link "E61" [ref=e179] [cursor=pointer]:
                - /url: /wiki/E-61
              - text: "-style"
              - link "espresso machine" [ref=e180] [cursor=pointer]:
                - /url: /wiki/Espresso_machine
              - text: with a bottomless (naked) portafilter, 2014
          - paragraph [ref=e181]:
            - text: Espresso (
            - generic [ref=e182]:
              - link /ɛˈsprɛsoʊ/ [ref=e184] [cursor=pointer]:
                - /url: /wiki/Help:IPA/English
                - text: /
                - generic [ref=e185]: ɛˈsprɛsoʊ
                - text: /
              - generic [ref=e186]:
                - button "Play audio" [ref=e188] [cursor=pointer]
                - superscript [ref=e190]:
                  - link "ⓘ" [ref=e191] [cursor=pointer]:
                    - /url: /wiki/File:LL-Q1860_(eng)-Back_ache-espresso.wav
            - text: ", Italian:"
            - link "[eˈsprɛsso]" [ref=e193] [cursor=pointer]:
              - /url: /wiki/Help:IPA/Italian
            - text: ) is a concentrated form of
            - link "coffee" [ref=e194] [cursor=pointer]:
              - /url: /wiki/Coffee
            - text: produced by forcing hot water under high pressure through finely ground coffee beans.
            - superscript [ref=e195]:
              - link "[1]" [ref=e196] [cursor=pointer]:
                - /url: "#cite_note-1"
            - text: Originating in
            - link "Italy" [ref=e197] [cursor=pointer]:
              - /url: /wiki/Italy
            - text: ", espresso has become one of the most popular coffee-brewing methods worldwide. It is characterized by its small serving size, typically 25–30 ml, and its distinctive layers: a dark body topped with a lighter-colored foam called \"crema\"."
          - paragraph [ref=e198]:
            - link "Espresso machines" [ref=e199] [cursor=pointer]:
              - /url: /wiki/Espresso_machine
            - text: use pressure to extract a highly concentrated coffee with a complex flavor profile in a short time, usually 25–30 seconds.
            - superscript [ref=e200]:
              - link "[2]" [ref=e201] [cursor=pointer]:
                - /url: "#cite_note-2"
            - text: The result is a beverage with a higher concentration of suspended and dissolved solids than regular
            - link "drip coffee" [ref=e202] [cursor=pointer]:
              - /url: /wiki/Drip_coffee
            - text: ", giving espresso its characteristic body and intensity."
            - superscript [ref=e203]:
              - link "[3]" [ref=e204] [cursor=pointer]:
                - /url: "#cite_note-3"
            - superscript [ref=e205]:
              - link "[4]" [ref=e206] [cursor=pointer]:
                - /url: "#cite_note-4"
            - superscript [ref=e207]:
              - link "[5]" [ref=e208] [cursor=pointer]:
                - /url: "#cite_note-5"
            - text: While espresso contains more caffeine per unit volume than most coffee beverages, its typical serving size results in less caffeine per serving compared to larger drinks such as drip coffee.
            - superscript [ref=e209]:
              - link "[6]" [ref=e210] [cursor=pointer]:
                - /url: "#cite_note-6"
            - superscript [ref=e211]:
              - link "[7]" [ref=e212] [cursor=pointer]:
                - /url: "#cite_note-7"
          - paragraph [ref=e213]:
            - text: Espresso serves as the base for other coffee drinks, including
            - link "cappuccino" [ref=e214] [cursor=pointer]:
              - /url: /wiki/Cappuccino
            - text: ","
            - link "caffè latte" [ref=e215] [cursor=pointer]:
              - /url: /wiki/Latte
            - text: ", and"
            - link "americano" [ref=e216] [cursor=pointer]:
              - /url: /wiki/Caff%C3%A8_americano
            - text: . It can be made with various types of coffee beans and roast levels, allowing for a wide range of flavors and strengths, despite the widespread myth that it is made with dark-roast coffee beans.
            - superscript [ref=e217]:
              - link "[8]" [ref=e218] [cursor=pointer]:
                - /url: "#cite_note-8"
            - text: The quality of an espresso is influenced by factors such as the grind size, water temperature, pressure, and the
            - link "barista" [ref=e219] [cursor=pointer]:
              - /url: /wiki/Barista
            - text: "'s skill in tamping (packing and leveling) the coffee grounds."
            - superscript [ref=e220]:
              - link "[9]" [ref=e221] [cursor=pointer]:
                - /url: "#cite_note-9"
            - superscript [ref=e222]:
              - link "[10]" [ref=e223] [cursor=pointer]:
                - /url: "#cite_note-10"
          - paragraph [ref=e224]:
            - text: The cultural significance of espresso extends beyond its consumption, playing a central role in
            - link "coffee shop" [ref=e225] [cursor=pointer]:
              - /url: /wiki/Coffeehouse
            - text: culture and the
            - link "third-wave coffee movement" [ref=e226] [cursor=pointer]:
              - /url: /wiki/Third-wave_coffee
            - text: ", which emphasizes artisanal production and high-quality beans."
          - generic [ref=e227]:
            - heading "Etymology and spelling" [level=2] [ref=e228]
            - generic [ref=e229]:
              - text: "["
              - link "edit" [ref=e230] [cursor=pointer]:
                - /url: /w/index.php?title=Espresso&action=edit&section=1
              - text: "]"
          - 'figure "A man pulls an espresso while leaning out of a train in a 1922 advertisement for a \"caffé espresso\" machine. The imagery references the shared associations of speed and steam, as well as name: in Italy, a class of trains is called \"espresso\".[11]" [ref=e231]':
            - link [ref=e232] [cursor=pointer]:
              - /url: /wiki/File:Victoria_Arduino,_1922.jpg
              - img [ref=e233]
            - generic [ref=e234]:
              - text: "A man pulls an espresso while leaning out of a train in a 1922 advertisement for a \"caffé espresso\" machine. The imagery references the shared associations of speed and steam, as well as name: in Italy, a class of trains is called \"espresso\"."
              - superscript [ref=e235]:
                - link "[11]" [ref=e236] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEMorris2010164-11"
          - paragraph [ref=e237]:
            - text: Although some English dictionaries translate espresso as 'pressed-out',
            - superscript [ref=e238]:
              - link "[12]" [ref=e239] [cursor=pointer]:
                - /url: "#cite_note-12"
            - text: "the word also conveys the sense of 'expressly for you' and 'quickly':"
          - blockquote [ref=e240]:
            - paragraph [ref=e241]:
              - text: The words express, expres and espresso each have several meanings in English, French and Italian. The first meaning is to do with the idea of "expressing" ("pressing out of") or squeezing the flavour from the coffee using the pressure of the steam. The second meaning is to do with speed, as in a train. Finally there is the notion of doing something "expressly" for a person ... The first Bezzera and Pavoni espresso machines in 1906 took 45 seconds to make a cup of coffee, one at a time, expressly for you.
              - superscript [ref=e242]:
                - link "[13]" [ref=e243] [cursor=pointer]:
                  - /url: "#cite_note-FOOTNOTEBersten199399-13"
          - paragraph [ref=e244]:
            - text: Modern espresso, using hot water under pressure, as pioneered by
            - link "Gaggia" [ref=e245] [cursor=pointer]:
              - /url: /wiki/Gaggia
            - text: in the 1940s, was originally called
            - link "crema caffè" [ref=e247] [cursor=pointer]:
              - /url: /wiki/Crema_caff%C3%A8
            - text: (lit. 'cream coffee'), as seen on old Gaggia machines, due to the crema.
            - superscript [ref=e248]:
              - link "[14]" [ref=e249] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEMorris2007-14"
          - paragraph [ref=e250]:
            - text: English speakers in America and England have sometimes spelled and pronounced espresso as expresso since at least the 1940s.
            - superscript [ref=e251]:
              - link "[15]" [ref=e252] [cursor=pointer]:
                - /url: "#cite_note-slate.com-15"
            - link "Dictionary.com" [ref=e254] [cursor=pointer]:
              - /url: /wiki/Dictionary.com
            - text: attributes the origin to ex- being a more common way that words start in English, making pronunciation easier, and several sources speculate an association between the drink and the word "express" may have contributed to its uptake.
            - superscript [ref=e255]:
              - link "[16]" [ref=e256] [cursor=pointer]:
                - /url: "#cite_note-diction-16"
            - superscript [ref=e257]:
              - link "[17]" [ref=e258] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBurchfield1996286-17"
            - superscript [ref=e259]:
              - link "[a]" [ref=e260] [cursor=pointer]:
                - /url: "#cite_note-19"
            - text: Outside of the
            - link "Anglosphere" [ref=e261] [cursor=pointer]:
              - /url: /wiki/Anglosphere
            - text: ", expresso is commonly used in France, Portugal and Spain. In the 1970s, the spelling espresso gained prominence,"
            - superscript [ref=e262]:
              - link "[15]" [ref=e263] [cursor=pointer]:
                - /url: "#cite_note-slate.com-15"
            - text: and by 1996, the third edition of
            - link "Fowler" [ref=e264] [cursor=pointer]:
              - /url: /wiki/H._W._Fowler
            - text: "'s"
            - link "Modern English Usage" [ref=e266] [cursor=pointer]:
              - /url: /wiki/A_Dictionary_of_Modern_English_Usage
            - text: described expresso as "entirely driven out".
            - superscript [ref=e267]:
              - link "[17]" [ref=e268] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBurchfield1996286-17"
            - text: As of 2016, the Oxford Dictionary online entry for espresso described the alternate spelling as "common".
            - superscript [ref=e269]:
              - link "[19]" [ref=e270] [cursor=pointer]:
                - /url: "#cite_note-oxforddictionaries.com-20"
          - paragraph [ref=e271]:
            - text: Italy uses the term espresso, substituting s for most x letters in
            - link "Latin" [ref=e272] [cursor=pointer]:
              - /url: /wiki/Latin
            - text: "-root words, with the term deriving from the past participle of the Italian verb esprimere, itself derived from the Latin exprimere, which means 'to express', and refers to the process by which hot water is forced under pressure through ground coffee;"
            - superscript [ref=e273]:
              - link "[18]" [ref=e274] [cursor=pointer]:
                - /url: "#cite_note-MW-grammar-18"
            - text: x is not considered part of the standard
            - link "Italian alphabet" [ref=e275] [cursor=pointer]:
              - /url: /wiki/Italian_orthography#Alphabet
            - text: . Italians commonly refer to espresso simply as
            - link "caffè" [ref=e277] [cursor=pointer]:
              - /url: /wiki/Coffee_in_Italy
            - text: (lit. 'coffee'), espresso being the ordinary coffee to order.
          - paragraph [ref=e278]:
            - text: According to
            - link "Slate" [ref=e279] [cursor=pointer]:
              - /url: /wiki/Slate_(magazine)
            - text: magazine, most commentary on whether expresso
            - link "should be considered correct" [ref=e280] [cursor=pointer]:
              - /url: /wiki/Linguistic_prescription
            - text: takes the negative. Such sources include Garner's Modern American Usage and Oxford Dictionaries online, who defer to how espresso is spelled in Italy.
            - superscript [ref=e281]:
              - link "[15]" [ref=e282] [cursor=pointer]:
                - /url: "#cite_note-slate.com-15"
            - superscript [ref=e283]:
              - link "[19]" [ref=e284] [cursor=pointer]:
                - /url: "#cite_note-oxforddictionaries.com-20"
            - text: Among some of these opponents, its use is considered a
            - link "faux pas" [ref=e285] [cursor=pointer]:
              - /url: /wiki/Faux_pas
            - text: ", and a mark of lacking sophistication. The Oxford English Dictionary and Merriam-Webster call it a variant spelling."
            - superscript [ref=e286]:
              - link "[15]" [ref=e287] [cursor=pointer]:
                - /url: "#cite_note-slate.com-15"
          - generic [ref=e288]:
            - heading "History" [level=2] [ref=e289]
            - generic [ref=e290]:
              - text: "["
              - link "edit" [ref=e291] [cursor=pointer]:
                - /url: /w/index.php?title=Espresso&action=edit&section=2
              - text: "]"
