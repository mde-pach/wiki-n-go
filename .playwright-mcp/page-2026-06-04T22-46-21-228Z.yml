            - text: have increased in popularity with the general rise of interest in espresso. Today, a wide range of home espresso equipment can be found in kitchen and appliance stores, online vendors, and department stores. The first espresso machine for home use was the
            - link "Gaggia" [ref=e707] [cursor=pointer]:
              - /url: /wiki/Gaggia
            - text: Gilda.
            - superscript [ref=e708]:
              - link "[53]" [ref=e709] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEBersten1993131-54"
            - text: Soon afterwards, similar machines such as the Faema Faemina, FE-AR La Peppina, and VAM Caravel followed suit, with similar form factors and operational principles.
