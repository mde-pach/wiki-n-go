          - paragraph [ref=e639]:
            - text: Any bean or roasting level can be used to produce authentic espresso. For example, in southern Italy, a darker roast is generally preferred. Farther north, the trend moves toward slightly lighter roasts, while outside Italy a wide range is popular.
            - superscript [ref=e640]:
