            - text: ), wet foamed (
            - link "microfoam" [ref=e721] [cursor=pointer]:
              - /url: /wiki/Microfoam
            - text: ), and dry foamed—or hot water.
            - superscript [ref=e722]:
              - link "[55]" [ref=e723] [cursor=pointer]:
                - /url: "#cite_note-56"
            - text: Several are listed below; for reference, espresso typically has a volume between 25–30 ml (0.85–1.01 US fl oz).
