                      - /url: "#cite_note-FDADailyValues-33"
          - paragraph [ref=e529]:
            - text: Espresso is generally thicker than coffee brewed by other methods, with a viscosity similar to that of warm honey. This is due to the higher concentration of
            - link "suspended" [ref=e530] [cursor=pointer]:
              - /url: /wiki/Suspended_solids
            - text: and
            - link "dissolved solids" [ref=e531] [cursor=pointer]:
              - /url: /wiki/Dissolved_solids
            - text: and the crema on top (a foam with a creamy consistency).
            - superscript [ref=e532]:
              - link "[33]" [ref=e533] [cursor=pointer]:
                - /url: "#cite_note-34"
            - text: As a result of the pressurized brewing process, the flavors and chemicals in a typical cup of espresso are very concentrated.
            - superscript [ref=e534]:
              - text: "["
              - link "citation needed" [ref=e536] [cursor=pointer]:
                - /url: /wiki/Wikipedia:Citation_needed
              - text: "]"
          - paragraph [ref=e537]:
            - text: Espresso contains more
            - link "caffeine" [ref=e538] [cursor=pointer]:
              - /url: /wiki/Caffeine
            - text: per unit volume than most coffee beverages, but as its usual serving size of 25–30 ml (1 US oz) is much smaller than other coffee drinks, the overall caffeine content of a single "serving" of espresso is generally lower than that of other coffees.
            - superscript [ref=e539]:
              - link "[34]" [ref=e540] [cursor=pointer]:
                - /url: "#cite_note-Mr._Coffee_blog_post-35"
            - text: While the exact caffeine content of any coffee drink will vary, a typical 30 milliliters (1 U.S. fluid ounce) serving of espresso contains approximately 65 milligrams of caffeine, but a typical 240 milliliters (8 U.S. fluid ounces) serving of drip coffee contains approximately 95 mg of caffeine.
            - superscript [ref=e541]:
              - link "[35]" [ref=e542] [cursor=pointer]:
                - /url: "#cite_note-36"
            - superscript [ref=e543]:
              - link "[36]" [ref=e544] [cursor=pointer]:
                - /url: "#cite_note-37"
            - superscript [ref=e545]:
              - link "[37]" [ref=e546] [cursor=pointer]:
                - /url: "#cite_note-38"
          - paragraph [ref=e547]:
            - text: "Unlike other coffee drinks, an espresso contains three phases: an emulsion of oil droplets, suspended solids, and a layer of gas bubbles or foam. In the mouth, the dispersed oil droplets are perceived as creamy, and they contribute to what is known as the drink's \"body\". These droplets preserve some aromatic compounds that are lost to the air in other brewing methods."
            - superscript [ref=e548]:
              - link "[38]" [ref=e549] [cursor=pointer]:
                - /url: "#cite_note-FOOTNOTEIllyViani2005-39"
          - paragraph [ref=e550]:
            - text: The crema, a layer of dense foam that appears at the top of the drink, is unique to espresso.
            - superscript [ref=e551]:
              - link "[39]" [ref=e552] [cursor=pointer]:
                - /url: "#cite_note-40"
            - superscript [ref=e553]:
              - link "[40]" [ref=e554] [cursor=pointer]:
                - /url: "#cite_note-41"
            - text: It is made up of
            - link "emulsified" [ref=e555] [cursor=pointer]:
              - /url: /wiki/Emulsion
            - text: oils in the ground coffee turned into a
            - link "colloid" [ref=e556] [cursor=pointer]:
              - /url: /wiki/Colloid
            - text: ", which does not occur in other brewing methods. Crema is produced when water placed under very high pressure dissolves more carbon dioxide, a gas present inside the coffee that is produced during the roasting process."
            - superscript [ref=e557]:
              - link "[41]" [ref=e558] [cursor=pointer]:
                - /url: "#cite_note-The_World_Atlas_Of_Coffee-42"
            - superscript [ref=e559]: ": 96"
          - generic [ref=e560]:
            - heading "Nutrition" [level=2] [ref=e561]
            - generic [ref=e562]:
              - text: "["
              - link "edit" [ref=e563] [cursor=pointer]:
                - /url: /w/index.php?title=Espresso&action=edit&section=7
              - text: "]"
          - paragraph [ref=e564]:
            - text: In a 100 ml (grams, 3.5 oz) reference amount, espresso has significant levels of
            - link "dietary mineral" [ref=e565] [cursor=pointer]:
              - /url: /wiki/Dietary_mineral
            - text: ","
            - link "magnesium" [ref=e566] [cursor=pointer]:
              - /url: /wiki/Magnesium
            - text: ","
            - link "B vitamins" [ref=e567] [cursor=pointer]:
              - /url: /wiki/B_vitamins
            - text: ","
            - link "niacin" [ref=e568] [cursor=pointer]:
              - /url: /wiki/Niacin_(nutrient)
            - text: ", and"
            - link "riboflavin" [ref=e569] [cursor=pointer]:
              - /url: /wiki/Riboflavin
            - text: ", and around 212 mg of caffeine per 100 grams of liquid brewed coffee (table)."
            - superscript [ref=e570]:
              - link "[42]" [ref=e571] [cursor=pointer]:
                - /url: "#cite_note-43"
          - generic [ref=e572]:
            - heading "Process" [level=2] [ref=e573]
            - generic [ref=e574]:
              - text: "["
              - link "edit" [ref=e575] [cursor=pointer]:
                - /url: /w/index.php?title=Espresso&action=edit&section=8
              - text: "]"
          - figure "Espresso brewing" [ref=e576]:
            - link [ref=e577] [cursor=pointer]:
              - /url: /wiki/File:Linea_doubleespresso.jpg
              - img [ref=e578]
            - generic [ref=e579]: Espresso brewing
          - paragraph [ref=e580]:
            - text: Espresso is made by forcing very hot water under high pressure through finely ground compacted coffee. There is no universal standard defining the process of extracting espresso,
            - superscript [ref=e581]:
              - link "[43]" [ref=e582] [cursor=pointer]:
                - /url: "#cite_note-44"
            - text: but several institutions have published definitions that restrict the amount and type of ground coffee used, the temperature and pressure of the water, and the rate of extraction.
            - superscript [ref=e583]:
              - link "[44]" [ref=e584] [cursor=pointer]:
                - /url: "#cite_note-45"
            - superscript [ref=e585]:
              - link "[45]" [ref=e586] [cursor=pointer]:
                - /url: "#cite_note-46"
            - text: Typically, an espresso is made using an
            - link "espresso machine" [ref=e587] [cursor=pointer]:
              - /url: /wiki/Espresso_machine
            - text: .
          - paragraph [ref=e588]:
            - text: The act of producing an espresso is often called "pulling" an espresso, originating from lever espresso machines, with which a
            - link "barista" [ref=e589] [cursor=pointer]:
              - /url: /wiki/Barista
            - text: pulls down a handle attached to a spring-loaded piston, which forces hot water through the coffee at high pressure. However, it is more common for an electric pump to generate the pressure.
            - superscript [ref=e590]:
              - link "[46]" [ref=e591] [cursor=pointer]:
                - /url: "#cite_note-47"
          - figure "Finely ground coffee for espresso" [ref=e592]:
            - link [ref=e593] [cursor=pointer]:
              - /url: /wiki/File:Fine_espresso.png
              - img [ref=e594]
            - generic [ref=e595]: Finely ground coffee for espresso
          - paragraph [ref=e596]:
            - link "Tamping" [ref=e597] [cursor=pointer]:
              - /url: /wiki/Coffee_tamping
            - text: down the coffee promotes the water's even penetration through the grounds.
            - superscript [ref=e598]:
              - link "[47]" [ref=e599] [cursor=pointer]:
                - /url: "#cite_note-48"
            - text: This process produces a thicker beverage by extracting both solid and dissolved components.
          - paragraph [ref=e600]:
            - text: "The technical parameters outlined by the Italian Espresso National Institute for making a \"certified Italian espresso\" are:"
            - superscript [ref=e601]:
              - link "[48]" [ref=e602] [cursor=pointer]:
                - /url: "#cite_note-49"
