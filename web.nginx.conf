server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  server_tokens off; # don't advertise the nginx version

  # Baseline security headers. (No CSP yet: article content + previews fetch from
  # the CDN / Worker / Wikipedia at runtime and Astro inlines hydration scripts,
  # so a Content-Security-Policy needs to be derived against the live app before
  # it can be turned on without breaking the no-rebuild model.)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # TLS terminates at Traefik, so nginx sees plain HTTP — without this its
  # trailing-slash redirects (/foo → /foo/) would emit an http:// Location and
  # bounce the browser through an extra hop. Relative redirects keep the scheme.
  absolute_redirect off;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Hashed build assets are immutable — cache hard. Page HTML stays uncached so a
  # redeploy shows up at once (article content comes from the CDN at runtime, not
  # from here, so it's never stale regardless).
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always; # re-add: a location's add_header drops inherited ones
  }

  # Astro 'directory' output: /page/ -> /page/index.html, with or without slash.
  location / {
    try_files $uri $uri/ =404;
  }

  # A route not in the last build (e.g. a just-created page) serves the generated
  # 404 shell, which boots the SPA and renders it — the no-rebuild promise. The
  # 404 status is correct: the page genuinely doesn't exist until saved.
  error_page 404 /404.html;
}
