name = "wikigit-accounts"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Sender for the sign-in code. Must be on a domain you've verified in Cloudflare
# Email Routing (required before the send binding works).
EMAIL_FROM = "login@accounts.wikigit.example"
# Engine origins allowed to complete a sign-in (open-redirect guard). Comma-separated.
ALLOWED_ORIGIN = "https://mde-pach.github.io,http://localhost:4321"

# OpenAuth flow + refresh-token storage AND our account records. No id → Wrangler
# auto-provisions on first deploy. Note: accounts live here, so unlike the Engine's
# cache-only KV this namespace holds durable data — don't wipe it.
[[kv_namespaces]]
binding = "AUTH_KV"

# Cloudflare Email Sending (public beta): delivers the magic code, no API key.
# Confirm the exact binding shape against the Email Service beta docs at deploy.
[[send_email]]
name = "EMAIL"
